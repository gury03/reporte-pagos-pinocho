<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Quiniela Mundial</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
        }
        
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background: linear-gradient(135deg, #e94560 0%, #533483 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #e94560;
        }
        
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            background: #533483;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .nav-btn.active {
            background: #e94560;
        }
        
        .panel {
            display: none;
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .panel.active {
            display: block;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            overflow-x: auto;
            display: block;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background: #533483;
            color: white;
        }
        
        .form-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .form-modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }
        
        .btn-primary {
            background: #e94560;
            color: white;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            display: none;
            z-index: 1000;
        }
        
        .toast.success {
            background: #28a745;
            color: white;
            display: block;
        }
        
        .toast.error {
            background: #dc3545;
            color: white;
            display: block;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        @media (max-width: 768px) {
            .admin-container { padding: 10px; }
            th, td { padding: 8px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div id="loginPanel" class="login-container">
        <h2 style="margin-bottom: 20px;">🔐 Panel Admin</h2>
        <input type="password" id="adminPass" placeholder="Contraseña" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px;">
        <button onclick="verificarAdmin()" style="width: 100%; padding: 10px; background: #e94560; color: white; border: none; border-radius: 8px; cursor: pointer;">Ingresar</button>
        <div id="loginError" style="color: red; margin-top: 10px;"></div>
    </div>
    
    <div id="adminPanel" style="display: none;">
        <div class="admin-container">
            <div class="header">
                <h1>⚽ Panel de Administración</h1>
                <p>Gestiona equipos, partidos, resultados y apuestas</p>
            </div>
            
            <div class="stats-grid" id="stats"></div>
            
            <div class="nav-tabs">
                <button class="nav-btn active" onclick="showPanel('apuestas')">📊 Apuestas</button>
                <button class="nav-btn" onclick="showPanel('equipos')">⚽ Equipos</button>
                <button class="nav-btn" onclick="showPanel('grupos')">📁 Grupos</button>
                <button class="nav-btn" onclick="showPanel('partidos')">📅 Partidos</button>
                <button class="nav-btn" onclick="showPanel('resultados')">🎯 Resultados</button>
                <button class="nav-btn" onclick="showPanel('usuarios')">👥 Usuarios</button>
            </div>
            
            <div id="panel-apuestas" class="panel active">
                <h3>Apuestas de Usuarios</h3>
                <div id="apuestas-table"><div class="loading">Cargando apuestas...</div></div>
            </div>
            
            <div id="panel-equipos" class="panel">
                <button class="btn btn-primary" onclick="openModal('equipo')">+ Agregar Equipo</button>
                <div id="equipos-table"><div class="loading">Cargando equipos...</div></div>
            </div>
            
            <div id="panel-grupos" class="panel">
                <button class="btn btn-primary" onclick="openModal('grupo')">+ Agregar Grupo</button>
                <div id="grupos-table"><div class="loading">Cargando grupos...</div></div>
            </div>
            
            <div id="panel-partidos" class="panel">
                <button class="btn btn-primary" onclick="openModal('partido')">+ Agregar Partido</button>
                <div id="partidos-table"><div class="loading">Cargando partidos...</div></div>
            </div>
            
            <div id="panel-resultados" class="panel">
                <h3>Cargar Resultados</h3>
                <div id="resultados-partidos"><div class="loading">Cargando partidos pendientes...</div></div>
            </div>
            
            <div id="panel-usuarios" class="panel">
                <div id="usuarios-table"><div class="loading">Cargando usuarios...</div></div>
            </div>
        </div>
    </div>
    
    <div id="modal" class="form-modal">
        <div class="form-modal-content">
            <h3 id="modal-title"></h3>
            <div id="modal-body"></div>
            <button class="btn btn-primary" onclick="guardarModal()">Guardar</button>
            <button class="btn" onclick="closeModal()">Cancelar</button>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script>
        // CAMBIA ESTA URL POR LA DE TU WORKER
        const API_URL = 'https://quiniela-mundial.thecrow859.workers.dev';
        
        let equiposList = [];
        let gruposList = [];
        
        async function verificarAdmin() {
            const password = document.getElementById('adminPass').value;
            const loginError = document.getElementById('loginError');
            
            if (!password) {
                loginError.textContent = 'Ingresa la contraseña';
                return;
            }
            
            loginError.textContent = '';
            
            try {
                const response = await fetch(`${API_URL}/api/admin/verificar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                
                if (response.ok) {
                    document.getElementById('loginPanel').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                    cargarTodo();
                } else {
                    const error = await response.json();
                    loginError.textContent = error.error || 'Contraseña incorrecta';
                }
            } catch (error) {
                loginError.textContent = 'Error de conexión: ' + error.message;
            }
        }
        
        async function cargarTodo() {
            await cargarEstadisticas();
            await cargarApuestas();
            await cargarEquipos();
            await cargarGrupos();
            await cargarPartidos();
            await cargarResultadosPendientes();
            await cargarUsuarios();
        }
        
        async function cargarEstadisticas() {
            try {
                const response = await fetch(`${API_URL}/api/admin/estadisticas`);
                const stats = await response.json();
                
                document.getElementById('stats').innerHTML = `
                    <div class="stat-card"><div class="stat-number">${stats.total_usuarios || 0}</div><div>Usuarios</div></div>
                    <div class="stat-card"><div class="stat-number">${stats.total_apuestas || 0}</div><div>Apuestas</div></div>
                    <div class="stat-card"><div class="stat-number">${stats.partidos_finalizados || 0}/${stats.total_partidos || 0}</div><div>Partidos</div></div>
                    <div class="stat-card"><div class="stat-number">${stats.porcentaje_finalizado || 0}%</div><div>Completado</div></div>
                `;
            } catch (error) {
                console.error('Error cargando estadísticas:', error);
                document.getElementById('stats').innerHTML = '<div class="stat-card">Error al cargar</div>';
            }
        }
        
        async function cargarApuestas() {
            try {
                const response = await fetch(`${API_URL}/api/admin/apuestas`);
                const data = await response.json();
                
                // Validar que sea un array
                const apuestas = Array.isArray(data) ? data : [];
                
                if (apuestas.length === 0) {
                    document.getElementById('apuestas-table').innerHTML = '<div class="loading">No hay apuestas registradas</div>';
                    return;
                }
                
                const html = `
                    <table style="width:100%; border-collapse: collapse;">
                        <thead>
                            <tr style="background: #533483; color: white;">
                                <th style="padding: 10px;">Usuario</th>
                                <th style="padding: 10px;">Partido</th>
                                <th style="padding: 10px;">Apuesta</th>
                                <th style="padding: 10px;">Resultado Real</th>
                                <th style="padding: 10px;">Puntos</th>
                                <th style="padding: 10px;">Fecha</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${apuestas.map(a => `
                                <tr style="border-bottom: 1px solid #ddd;">
                                    <td style="padding: 10px;">${a.usuario_nombre || '?'}<br><small>${a.email || ''}</small></td>
                                    <td style="padding: 10px;">${a.equipo_local || '?'} vs ${a.equipo_visitante || '?'}</td>
                                    <td style="padding: 10px;"><strong>${a.goles_local || 0} - ${a.goles_visitante || 0}</strong></td>
                                    <td style="padding: 10px;">${a.finalizado ? `${a.resultado_local || 0} - ${a.resultado_visitante || 0}` : 'Pendiente'}</td>
                                    <td style="padding: 10px; color: ${(a.puntos_obtenidos || 0) > 0 ? 'green' : 'red'}; font-weight: bold;">${a.puntos_obtenidos || 0}</td>
                                    <td style="padding: 10px;">${a.fecha_apuesta ? new Date(a.fecha_apuesta).toLocaleDateString() : '-'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                document.getElementById('apuestas-table').innerHTML = html;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('apuestas-table').innerHTML = '<div class="loading">Error al cargar apuestas</div>';
            }
        }
        
        async function cargarEquipos() {
            try {
                const response = await fetch(`${API_URL}/api/admin/equipos`);
                const data = await response.json();
                
                // Validar que sea un array
                equiposList = Array.isArray(data) ? data : [];
                
                if (equiposList.length === 0) {
                    document.getElementById('equipos-table').innerHTML = '<div class="loading">No hay equipos registrados</div>';
                    return;
                }
                
                const html = `
                    <button class="btn btn-primary" onclick="openModal('equipo')">+ Nuevo Equipo</button>
                    <table style="width:100%; margin-top: 15px; border-collapse: collapse;">
                        <thead>
                            <tr style="background: #533483; color: white;">
                                <th style="padding: 10px;">ID</th>
                                <th style="padding: 10px;">Equipo</th>
                                <th style="padding: 10px;">Grupo</th>
                                <th style="padding: 10px;">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${equiposList.map(e => `
                                <tr style="border-bottom: 1px solid #ddd;">
                                    <td style="padding: 10px;">${e.id || '?'}</td>
                                    <td style="padding: 10px;">${e.nombre || '?'}</td>
                                    <td style="padding: 10px;">${e.grupo_nombre || '-'}</td>
                                    <td style="padding: 10px;">
                                        <button class="btn btn-primary" onclick="editarEquipo(${e.id})">✏️</button>
                                        <button class="btn btn-danger" onclick="eliminarEquipo(${e.id})">🗑️</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                document.getElementById('equipos-table').innerHTML = html;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('equipos-table').innerHTML = '<div class="loading">Error al cargar equipos</div>';
            }
        }
        
        async function cargarGrupos() {
            try {
                const response = await fetch(`${API_URL}/api/admin/grupos`);
                const data = await response.json();
                
                // Validar que sea un array
                gruposList = Array.isArray(data) ? data : [];
                
                if (gruposList.length === 0) {
                    document.getElementById('grupos-table').innerHTML = '<div class="loading">No hay grupos registrados</div>';
                    return;
                }
                
                const html = `
                    <button class="btn btn-primary" onclick="openModal('grupo')">+ Nuevo Grupo</button>
                    <table style="width:100%; margin-top: 15px; border-collapse: collapse;">
                        <thead>
                            <tr style="background: #533483; color: white;">
                                <th style="padding: 10px;">ID</th>
                                <th style="padding: 10px;">Grupo</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${gruposList.map(g => `
                                <tr style="border-bottom: 1px solid #ddd;">
                                    <td style="padding: 10px;">${g.id || '?'}</td>
                                    <td style="padding: 10px;">Grupo ${g.nombre || '?'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                document.getElementById('grupos-table').innerHTML = html;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('grupos-table').innerHTML = '<div class="loading">Error al cargar grupos</div>';
            }
        }
        
        async function cargarPartidos() {
            try {
                const response = await fetch(`${API_URL}/api/admin/partidos`);
                const data = await response.json();
                
                // Validar que sea un array
                const partidos = Array.isArray(data) ? data : [];
                
                if (partidos.length === 0) {
                    document.getElementById('partidos-table').innerHTML = '<div class="loading">No hay partidos registrados</div>';
                    return;
                }
                
                const html = `
                    <button class="btn btn-primary" onclick="openModal('partido')">+ Nuevo Partido</button>
                    <table style="width:100%; margin-top: 15px; border-collapse: collapse;">
                        <thead>
                            <tr style="background: #533483; color: white;">
                                <th style="padding: 10px;">Local</th>
                                <th style="padding: 10px;">Visitante</th>
                                <th style="padding: 10px;">Grupo</th>
                                <th style="padding: 10px;">Fecha</th>
                                <th style="padding: 10px;">Estado</th>
                                <th style="padding: 10px;">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${partidos.map(p => `
                                <tr style="border-bottom: 1px solid #ddd;">
                                    <td style="padding: 10px;">${p.equipo_local_nombre || '?'}</td>
                                    <td style="padding: 10px;">${p.equipo_visitante_nombre || '?'}</td>
                                    <td style="padding: 10px;">${p.grupo_nombre || '-'}</td>
                                    <td style="padding: 10px;">${p.fecha_partido ? new Date(p.fecha_partido).toLocaleString() : '-'}</td>
                                    <td style="padding: 10px;">${p.finalizado ? '✅ Finalizado' : '⏳ Pendiente'}</td>
                                    <td style="padding: 10px;">
                                        <button class="btn btn-primary" onclick="editarPartido(${p.id})">✏️</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                document.getElementById('partidos-table').innerHTML = html;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('partidos-table').innerHTML = '<div class="loading">Error al cargar partidos</div>';
            }
        }
        
        async function cargarResultadosPendientes() {
            try {
                const response = await fetch(`${API_URL}/api/admin/partidos`);
                const data = await response.json();
                
                // Validar que sea un array
                const partidos = Array.isArray(data) ? data : [];
                const pendientes = partidos.filter(p => !p.finalizado);
                
                if (pendientes.length === 0) {
                    document.getElementById('resultados-partidos').innerHTML = '<div class="loading">Todos los partidos ya están finalizados</div>';
                    return;
                }
                
                const html = `
                    <table style="width:100%; border-collapse: collapse;">
                        <thead>
                            <tr style="background: #533483; color: white;">
                                <th style="padding: 10px;">Local</th>
                                <th style="padding: 10px;">Visitante</th>
                                <th style="padding: 10px;">Fecha</th>
                                <th style="padding: 10px;">Resultado</th>
                                <th style="padding: 10px;">Acción</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${pendientes.map(p => `
                                <tr style="border-bottom: 1px solid #ddd;">
                                    <td style="padding: 10px;">${p.equipo_local_nombre || '?'}</td>
                                    <td style="padding: 10px;">${p.equipo_visitante_nombre || '?'}</td>
                                    <td style="padding: 10px;">${p.fecha_partido ? new Date(p.fecha_partido).toLocaleString() : '-'}</td>
                                    <td style="padding: 10px;">
                                        <input type="number" id="res_local_${p.id}" placeholder="0" style="width: 60px;"> -
                                        <input type="number" id="res_visit_${p.id}" placeholder="0" style="width: 60px;">
                                    </td>
                                    <td style="padding: 10px;">
                                        <button class="btn btn-success" onclick="cargarResultado(${p.id})">Cargar</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                document.getElementById('resultados-partidos').innerHTML = html;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('resultados-partidos').innerHTML = '<div class="loading">Error al cargar partidos</div>';
            }
        }
        
        async function cargarUsuarios() {
            try {
                const response = await fetch(`${API_URL}/api/ranking`);
                const data = await response.json();
                
                // Validar que sea un array
                const usuarios = Array.isArray(data) ? data : [];
                
                if (usuarios.length === 0) {
                    document.getElementById('usuarios-table').innerHTML = '<div class="loading">No hay usuarios registrados</div>';
                    return;
                }
                
                const html = `
                    <table style="width:100%; border-collapse: collapse;">
                        <thead>
                            <tr style="background: #533483; color: white;">
                                <th style="padding: 10px;">Nombre</th>
                                <th style="padding: 10px;">Email</th>
                                <th style="padding: 10px;">Teléfono</th>
                                <th style="padding: 10px;">Ciudad</th>
                                <th style="padding: 10px;">Puntos</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${usuarios.map(u => `
                                <tr style="border-bottom: 1px solid #ddd;">
                                    <td style="padding: 10px;">${u.nombre || '?'}</td>
                                    <td style="padding: 10px;">${u.email || '-'}</td>
                                    <td style="padding: 10px;">${u.telefono || '-'}</td>
                                    <td style="padding: 10px;">${u.ciudad || '-'}</td>
                                    <td style="padding: 10px;"><strong>${u.total_puntos || 0}</strong></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                document.getElementById('usuarios-table').innerHTML = html;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('usuarios-table').innerHTML = '<div class="loading">Error al cargar usuarios</div>';
            }
        }
        
        async function cargarResultado(partidoId) {
            const golesLocal = document.getElementById(`res_local_${partidoId}`).value;
            const golesVisitante = document.getElementById(`res_visit_${partidoId}`).value;
            
            if (!golesLocal || !golesVisitante) {
                mostrarToast('Ingresa ambos resultados', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/api/admin/resultado`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        partido_id: partidoId,
                        resultado_local: parseInt(golesLocal),
                        resultado_visitante: parseInt(golesVisitante)
                    })
                });
                
                if (response.ok) {
                    mostrarToast('Resultado cargado correctamente', 'success');
                    await cargarResultadosPendientes();
                    await cargarApuestas();
                    await cargarPartidos();
                    await cargarEstadisticas();
                } else {
                    const error = await response.json();
                    mostrarToast(error.error || 'Error al cargar resultado', 'error');
                }
            } catch (error) {
                mostrarToast('Error de conexión', 'error');
            }
        }
        
        function openModal(type, data = null) {
            currentModalType = type;
            const modal = document.getElementById('modal');
            const title = document.getElementById('modal-title');
            const body = document.getElementById('modal-body');
            
            if (type === 'equipo') {
                title.textContent = data ? 'Editar Equipo' : 'Nuevo Equipo';
                body.innerHTML = `
                    <div class="form-group"><label>Nombre del Equipo</label><input type="text" id="equipo_nombre" value="${data?.nombre || ''}"></div>
                    <div class="form-group"><label>Grupo</label><select id="equipo_grupo_id">${gruposList.map(g => `<option value="${g.id}" ${data?.grupo_id === g.id ? 'selected' : ''}>Grupo ${g.nombre}</option>`).join('')}</select></div>
                    <div class="form-group"><label>URL Bandera (opcional)</label><input type="text" id="equipo_bandera" value="${data?.bandera_url || ''}"></div>
                `;
            } else if (type === 'grupo') {
                title.textContent = 'Nuevo Grupo';
                body.innerHTML = `<div class="form-group"><label>Nombre del Grupo (Ej: A, B, C)</label><input type="text" id="grupo_nombre" placeholder="A"></div>`;
            } else if (type === 'partido') {
                title.textContent = data ? 'Editar Partido' : 'Nuevo Partido';
                body.innerHTML = `
                    <div class="form-group"><label>Equipo Local</label><select id="partido_local">${equiposList.map(e => `<option value="${e.id}" ${data?.equipo_local_id === e.id ? 'selected' : ''}>${e.nombre}</option>`).join('')}</select></div>
                    <div class="form-group"><label>Equipo Visitante</label><select id="partido_visitante">${equiposList.map(e => `<option value="${e.id}" ${data?.equipo_visitante_id === e.id ? 'selected' : ''}>${e.nombre}</option>`).join('')}</select></div>
                    <div class="form-group"><label>Grupo</label><select id="partido_grupo"><option value="">Sin grupo</option>${gruposList.map(g => `<option value="${g.id}" ${data?.grupo_id === g.id ? 'selected' : ''}>Grupo ${g.nombre}</option>`).join('')}</select></div>
                    <div class="form-group"><label>Fecha y Hora</label><input type="datetime-local" id="partido_fecha" value="${data?.fecha_partido?.slice(0, 16) || ''}"></div>
                    <div class="form-group"><label>Jornada</label><input type="number" id="partido_jornada" value="${data?.jornada || '1'}"></div>
                `;
            }
            
            modal.style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
        
        async function guardarModal() {
            if (currentModalType === 'equipo') {
                const nombre = document.getElementById('equipo_nombre').value;
                const grupo_id = document.getElementById('equipo_grupo_id').value;
                const bandera_url = document.getElementById('equipo_bandera').value;
                
                if (!nombre) {
                    mostrarToast('Ingresa el nombre del equipo', 'error');
                    return;
                }
                
                await fetch(`${API_URL}/api/admin/equipos`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, grupo_id: parseInt(grupo_id), bandera_url })
                });
                mostrarToast('Equipo agregado', 'success');
            } else if (currentModalType === 'grupo') {
                const nombre = document.getElementById('grupo_nombre').value;
                
                if (!nombre) {
                    mostrarToast('Ingresa el nombre del grupo', 'error');
                    return;
                }
                
                await fetch(`${API_URL}/api/admin/grupos`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre })
                });
                mostrarToast('Grupo agregado', 'success');
            } else if (currentModalType === 'partido') {
                const equipo_local_id = document.getElementById('partido_local').value;
                const equipo_visitante_id = document.getElementById('partido_visitante').value;
                const grupo_id = document.getElementById('partido_grupo').value;
                const fecha_partido = document.getElementById('partido_fecha').value;
                const jornada = document.getElementById('partido_jornada').value;
                
                if (!equipo_local_id || !equipo_visitante_id || !fecha_partido) {
                    mostrarToast('Completa todos los campos requeridos', 'error');
                    return;
                }
                
                await fetch(`${API_URL}/api/admin/partidos`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        equipo_local_id: parseInt(equipo_local_id),
                        equipo_visitante_id: parseInt(equipo_visitante_id),
                        grupo_id: grupo_id ? parseInt(grupo_id) : null,
                        fecha_partido,
                        jornada: parseInt(jornada)
                    })
                });
                mostrarToast('Partido agregado', 'success');
            }
            
            closeModal();
            await cargarEquipos();
            await cargarGrupos();
            await cargarPartidos();
        }
        
        function showPanel(panel) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`panel-${panel}`).classList.add('active');
            if (event && event.target) event.target.classList.add('active');
        }
        
        function mostrarToast(msg, tipo) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast ${tipo}`;
            setTimeout(() => {
                toast.style.display = 'none';
                toast.className = 'toast';
            }, 3000);
        }
        
        // Funciones placeholder para evitar errores
        function editarEquipo(id) {
            const equipo = equiposList.find(e => e.id === id);
            if (equipo) openModal('equipo', equipo);
        }
        
        function eliminarEquipo(id) {
            if (confirm('¿Eliminar este equipo?')) {
                // Implementar eliminación
                mostrarToast('Función en desarrollo', 'error');
            }
        }
        
        function editarPartido(id) {
            // Implementar edición
            mostrarToast('Función en desarrollo', 'error');
        }
        
        let currentModalType = '';
    </script>
</body>
</html>
